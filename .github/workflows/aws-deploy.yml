name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    concurrency: deploy-group
    env:
      AWS_REGION: us-east-1
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/wardley:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/wardley:latest
          cache-from: type=registry,ref=${{ steps.ecr.outputs.registry }}/wardley:cache
          cache-to: type=registry,ref=${{ steps.ecr.outputs.registry }}/wardley:cache,mode=max

  deploy:
    name: Rolling deploy
    needs: build
    uses: ./.github/workflows/restart.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit
